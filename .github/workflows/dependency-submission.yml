name: Dependency Submission

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'
      - uses: Taure/rebar3-dependency-submission@main
